<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViviTorr - Magnet Link</title>
    <meta name="theme-color" content="#5DADE2">
    <link rel="icon" href="./logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5DADE2;
            --primary-dark: #3498db;
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #ffffff;
            --text-muted: #8892a0;
            --border: #1e1e2e;
            --success: #2ecc71;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at top, rgba(93, 173, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(93, 173, 226, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            text-decoration: none;
            color: var(--text);
        }

        .logo img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }

        .logo span {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary);
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            line-height: 1.4;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Hide mobile text on desktop, show desktop text */
        .mobile-text { display: none; }
        .desktop-text { display: inline; }

        .magnet-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            max-height: 120px;
            overflow-y: auto;
            user-select: all;
            -webkit-user-select: all;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(93, 173, 226, 0.1);
        }

        .error {
            text-align: center;
            padding: 30px;
        }

        .error h2 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .error p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text);
            font-weight: 500;
        }

        /* Mobile styles */
        @media (max-width: 768px) {
            .mobile-text { display: inline; }
            .desktop-text { display: none; }

            body {
                padding: 12px;
            }

            .logo {
                margin-bottom: 16px;
            }

            .logo img {
                width: 32px;
                height: 32px;
            }

            .logo span {
                font-size: 1.1rem;
            }

            .card {
                padding: 20px;
            }

            .card-title {
                font-size: 1.05rem;
            }

            .card-subtitle {
                font-size: 0.85rem;
                margin-bottom: 16px;
            }

            .magnet-box {
                max-height: 100px;
                font-size: 0.75rem;
                padding: 14px;
            }

            .btn {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .info {
                margin-top: 16px;
                padding-top: 16px;
            }

            .info-row {
                font-size: 0.9rem;
                margin-bottom: 8px;
            }
        }

        /* Very small screens */
        @media (max-height: 600px) {
            .logo {
                margin-bottom: 10px;
            }

            .card {
                padding: 16px;
            }

            .card-title {
                font-size: 1rem;
                margin-bottom: 6px;
            }

            .card-subtitle {
                margin-bottom: 12px;
            }

            .magnet-box {
                max-height: 70px;
                margin-bottom: 14px;
                padding: 10px;
            }

            .info {
                margin-top: 12px;
                padding-top: 12px;
            }

            .info-row {
                margin-bottom: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <a href="/" class="logo">
            <img src="./logo.png" alt="ViviTorr">
            <span>ViviTorr</span>
        </a>

        <div class="card" id="content">
            <!-- Content loaded by JS -->
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const magnet = params.get('magnet');
        const title = params.get('title') || 'Torrent';
        const quality = params.get('q') || '';
        const size = params.get('s') || '';
        const seeders = params.get('p') || '';

        const content = document.getElementById('content');
        const toast = document.getElementById('toast');

        function init() {
            if (!magnet) {
                content.innerHTML = `
                    <div class="error">
                        <h2>No Magnet Link</h2>
                        <p>No magnet link was provided. Use /search on Discord to get magnet links.</p>
                    </div>
                `;
                return;
            }

            let infoHtml = '';
            if (quality || size || seeders) {
                infoHtml = `
                    <div class="info">
                        ${quality ? `<div class="info-row"><span class="info-label">Quality</span><span class="info-value">${quality}</span></div>` : ''}
                        ${size ? `<div class="info-row"><span class="info-label">Size</span><span class="info-value">${size}</span></div>` : ''}
                        ${seeders ? `<div class="info-row"><span class="info-label">Seeders</span><span class="info-value">${seeders}</span></div>` : ''}
                    </div>
                `;
            }

            content.innerHTML = `
                <div class="card-title">${decodeURIComponent(title)}</div>
                <div class="card-subtitle">
                    <span class="mobile-text">Tap and hold to select, or use the copy button</span>
                    <span class="desktop-text">Click on text area and press Ctrl+C to copy</span>
                </div>
                <div class="magnet-box" id="magnetBox">${magnet}</div>
                <div class="buttons">
                    <button class="btn btn-primary" onclick="copyMagnet()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy
                    </button>
                    <a href="${magnet}" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                        Open in App
                    </a>
                </div>
                ${infoHtml}
            `;
        }

        // Start initialization
        init();

        function copyMagnet() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(magnet).then(() => {
                    showToast();
                }).catch(() => {
                    fallbackCopy(magnet);
                });
            } else {
                fallbackCopy(magnet);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast();
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
