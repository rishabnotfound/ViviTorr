<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViviTorr - Magnet Link</title>
    <meta name="theme-color" content="#5DADE2">
    <link rel="icon" href="./logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #5DADE2;
            --primary-dark: #3498db;
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #ffffff;
            --text-muted: #8892a0;
            --border: #1e1e2e;
            --success: #2ecc71;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at top, rgba(93, 173, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(93, 173, 226, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            text-decoration: none;
            color: var(--text);
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .logo span {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .magnet-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            max-height: 150px;
            overflow-y: auto;
            user-select: all;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(93, 173, 226, 0.1);
        }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .error {
            text-align: center;
            padding: 40px;
        }

        .error h2 {
            color: var(--primary);
            margin-bottom: 12px;
        }

        .error p {
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <a href="/" class="logo">
            <img src="./logo.png" alt="ViviTorr">
            <span>ViviTorr</span>
        </a>

        <div class="card" id="content">
            <!-- Content loaded by JS -->
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const infoHash = params.get('hash');
        const title = params.get('title') || 'Torrent';
        const quality = params.get('q') || '';
        const size = params.get('s') || '';
        const seeders = params.get('p') || '';

        const content = document.getElementById('content');
        const toast = document.getElementById('toast');

        // Trackers will be fetched
        let trackers = [];
        let magnet = '';

        async function fetchTrackers() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_best.txt');
                const text = await response.text();
                trackers = text.split('\n').filter(t => t.trim() !== '');
            } catch (e) {
                // Fallback trackers if fetch fails
                trackers = [
                    'udp://tracker.opentrackr.org:1337/announce',
                    'udp://open.stealth.si:80/announce',
                    'udp://tracker.torrent.eu.org:451/announce',
                    'udp://exodus.desync.com:6969/announce'
                ];
            }
        }

        function buildMagnet() {
            const trackerParams = trackers.map(t => `tr=${encodeURIComponent(t)}`).join('&');
            return `magnet:?xt=urn:btih:${infoHash}&${trackerParams}`;
        }

        async function init() {
            if (!infoHash) {
                content.innerHTML = `
                    <div class="error">
                        <h2>No Magnet Link</h2>
                        <p>No magnet link was provided. Use /search on Discord to get magnet links.</p>
                    </div>
                `;
                return;
            }

            // Show loading state
            content.innerHTML = `
                <div class="card-title">Loading...</div>
                <div class="card-subtitle">Fetching trackers...</div>
            `;

            await fetchTrackers();
            magnet = buildMagnet();

            let infoHtml = '';
            if (quality || size || seeders) {
                infoHtml = `
                    <div class="info">
                        ${quality ? `<div class="info-row"><span class="info-label">Quality</span><span class="info-value">${quality}</span></div>` : ''}
                        ${size ? `<div class="info-row"><span class="info-label">Size</span><span class="info-value">${size}</span></div>` : ''}
                        ${seeders ? `<div class="info-row"><span class="info-label">Seeders</span><span class="info-value">${seeders}</span></div>` : ''}
                    </div>
                `;
            }

            content.innerHTML = `
                <div class="card-title">${decodeURIComponent(title)}</div>
                <div class="card-subtitle">Tap and hold to select, or use the copy button</div>
                <div class="magnet-box" id="magnetBox">${magnet}</div>
                <div class="buttons">
                    <button class="btn btn-primary" onclick="copyMagnet()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy
                    </button>
                    <a href="${magnet}" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                        Open in App
                    </a>
                </div>
                ${infoHtml}
            `;
        }

        // Start initialization
        init();

        function copyMagnet() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(magnet).then(() => {
                    showToast();
                }).catch(() => {
                    fallbackCopy(magnet);
                });
            } else {
                fallbackCopy(magnet);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast();
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
